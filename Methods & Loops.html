<!DOCTYPE html>
<html>
<body>

  <h3>Current Date</h3>
  <script>
    d = new Date();

    document.write(d.getDate() + "/" + (d.getMonth() + 1) + "/" + d.getFullYear());
  </script>

  <h3>Rounded Number</h3>
  <script>
    document.write(Math.round(5.7));
  </script>

  <h3>Random Integers</h3>
  <script>
    for (i = 0; i < 3; i++) {
    randomNumber = Math.ceil(Math.random() * 100);
    document.write(randomNumber + "<br>");
    }
  </script>

</body>
</html>
